name: Docker 컨테이너로 EC2에 배포하기

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub 코드 체크아웃
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. application.properties 생성
      - name: Create application.properties
        run: echo "${{ secrets.APPLICATION_PROPERTIES }}" > ./src/main/resources/application.properties

      # 2. application.properties 생성
      - name: Create docker-compose.yml 생성
        run: echo "${{ secrets.DOCKER_COMPOSE  }}" > ./docker-compose.yml

      # 3. gradlew에 실행 권한 부여
      - name: Gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      # 4. Gradle 빌드 실행
      - name: Gradle 빌드 실행
        run: ./gradlew clean build

      # 5. Docker Hub 로그인
      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Docker 이미지 빌드
      - name: Docker 이미지 빌드
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:latest .

      # 7. Docker 이미지 푸시
      - name: Docker 이미지 푸시
        run: docker push ${{ secrets.DOCKER_USERNAME }}/myapp:latest

      # 8. docker-compose.yml 파일을 EC2로 복사
      - name: docker-compose.yml 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/cicd-docker/"

      # 9. .env 파일 생성 및 docker-compose 실행
      - name: EC2에서 컨테이너 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script_stop: true
          script: |
            mkdir -p ~/cicd-docker

            # .env 파일 생성
            # echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" > ~/cicd-docker/.env
            # echo "secrets.EC2_USERNAME=${{ secrets.EC2_USERNAME }}" >> ~/cicd-docker/.env
            
            cd ~/cicd-docker
            docker-compose down || true
            docker-compose pull
            docker-compose up -d
